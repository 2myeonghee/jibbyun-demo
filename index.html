<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아파트집사 — AI 법률 상담</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sidebar-w: 64px;
      --panel-w: 320px;
      --primary: #1a2a3a;
      --accent: #5b6af4;
      --accent-bg: #ededff;
      --text: #1a1a1a;
      --text-sm: #666;
      --border: #e5e7eb;
      --bg: #f7f8fa;
      --user-bubble: #f0f1f4;
      --card-bg: #ffffff;
      --header-h: 52px;
      --input-h: 64px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); height:100vh; overflow:hidden; }

    /* ── 전체 레이아웃 ─────────────────────────────── */
    .app { display:flex; height:100vh; }

    /* ── 사이드바 ──────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      flex-shrink: 0;
      z-index: 10;
    }
    .sidebar .sb-top { flex:1; width:100%; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .sidebar .sb-bot { width:100%; display:flex; flex-direction:column; align-items:center; gap:4px; padding-bottom:8px; }
    .sb-icon {
      width:40px; height:40px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:#9ca3af; transition:all .15s;
    }
    .sb-icon:hover { background:#f3f4f6; color:#374151; }
    .sb-icon.active { background:var(--accent-bg); color:var(--accent); }
    .sb-icon svg { width:20px; height:20px; }
    .sb-label {
      font-size:10px; color:#9ca3af; font-weight:500;
      letter-spacing:.5px; margin:8px 0 4px; width:100%;
      text-align:center;
    }
    .sb-divider { width:32px; height:1px; background:var(--border); margin:8px 0; }

    /* ── 채팅 영역 ─────────────────────────────────── */
    .chat-wrap {
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      background:#fff;
      border-right:1px solid var(--border);
    }
    .chat-header {
      height:var(--header-h);
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      flex-shrink:0;
      background:#fff;
    }
    .chat-header .back-btn {
      display:flex; align-items:center; gap:6px;
      font-size:13px; color:#374151; cursor:pointer;
      padding:6px 8px; border-radius:6px;
    }
    .chat-header .back-btn:hover { background:#f3f4f6; }
    .chat-header .help-btn {
      width:28px; height:28px; border-radius:50%;
      border:1.5px solid #d1d5db; display:flex;
      align-items:center; justify-content:center;
      font-size:12px; color:#6b7280; cursor:pointer;
    }
    .chat-messages {
      flex:1;
      overflow-y:auto;
      padding:24px 28px;
      display:flex;
      flex-direction:column;
      gap:20px;
      scroll-behavior:smooth;
    }
    .chat-messages::-webkit-scrollbar { width:4px; }
    .chat-messages::-webkit-scrollbar-thumb { background:#e5e7eb; border-radius:4px; }

    /* 메시지 공통 */
    .msg { display:flex; flex-direction:column; max-width:72%; animation:fadeUp .25s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg.user { align-self:flex-end; align-items:flex-end; }
    .msg.ai { align-self:flex-start; align-items:flex-start; max-width:100%; }

    .msg-bubble {
      padding:12px 16px;
      border-radius:16px;
      font-size:14px;
      line-height:1.6;
      color:var(--text);
    }
    .msg.user .msg-bubble { background:var(--user-bubble); border-radius:16px 4px 16px 16px; }
    .msg.ai .msg-bubble {
      background:transparent;
      padding:0;
      color:#1f2937;
    }
    .msg.ai .msg-bubble p { margin-bottom:8px; }
    .msg.ai .msg-bubble p:last-child { margin-bottom:0; }

    /* 빠른 답변 버튼 */
    .quick-btns {
      display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;
    }
    .qbtn {
      padding:8px 16px;
      border:1.5px solid #d1d5db;
      border-radius:24px;
      background:#fff;
      font-size:13px;
      font-family:'Noto Sans KR',sans-serif;
      color:#374151;
      cursor:pointer;
      transition:all .15s;
      white-space:nowrap;
    }
    .qbtn:hover { border-color:#374151; background:#f9fafb; }
    .qbtn.selected { border-color:#1a2a3a; background:#f0f1f4; color:#1a2a3a; font-weight:500; }
    .qbtn:disabled { opacity:.45; cursor:default; pointer-events:none; }

    /* 탭 영역 */
    .result-tabs {
      margin-top:16px;
      border-bottom:1px solid var(--border);
      display:flex; gap:0;
    }
    .rtab {
      padding:10px 16px;
      font-size:13px; color:#6b7280;
      cursor:pointer; border-bottom:2px solid transparent;
      margin-bottom:-1px; transition:all .15s; white-space:nowrap;
    }
    .rtab.active { color:#1a1a1a; font-weight:600; border-color:#1a1a1a; }
    .rtab:hover:not(.active) { color:#374151; }

    .tab-content { margin-top:12px; display:flex; flex-direction:column; gap:8px; }
    .case-card {
      border:1px solid var(--border);
      border-radius:10px;
      padding:14px 16px;
      background:#fff;
      cursor:pointer;
      transition:all .15s;
    }
    .case-card:hover { border-color:#9ca3af; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .case-card .cc-title { font-size:13px; font-weight:600; color:#1a1a1a; margin-bottom:4px; }
    .case-card .cc-desc { font-size:12px; color:#6b7280; }

    /* 상세 케이스 카드 */
    .detail-card {
      background:#f8f9fa;
      border-radius:12px;
      padding:20px;
      margin-top:8px;
      font-size:13px;
      line-height:1.7;
      animation:fadeUp .2s ease;
    }
    .detail-card .dc-title { font-size:14px; font-weight:700; margin-bottom:12px; color:#1a1a1a; }
    .detail-card .dc-section { margin-bottom:12px; }
    .detail-card .dc-section h4 { font-size:12px; color:var(--accent); font-weight:600; margin-bottom:6px; }
    .detail-card .dc-section ul { padding-left:16px; color:#374151; }
    .detail-card .dc-section ul li { margin-bottom:3px; }

    /* 입력 영역 */
    .chat-input-wrap {
      height:var(--input-h);
      border-top:1px solid var(--border);
      padding:10px 20px;
      display:flex; align-items:center; gap:10px;
      background:#fff; flex-shrink:0;
    }
    .chat-input {
      flex:1;
      border:1.5px solid #e5e7eb;
      border-radius:28px;
      padding:10px 18px;
      font-size:13.5px;
      font-family:'Noto Sans KR',sans-serif;
      outline:none; color:#1a1a1a;
      background:#f9fafb;
      transition:border-color .15s;
    }
    .chat-input:focus { border-color:#9ca3af; background:#fff; }
    .chat-input::placeholder { color:#b0b5be; }
    .send-btn {
      width:38px; height:38px; flex-shrink:0;
      background:#374151; border-radius:50%; border:none;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .15s;
    }
    .send-btn:hover { background:#1a2a3a; }
    .send-btn svg { width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2; }

    /* ── 오른쪽 패널 ────────────────────────────────── */
    .right-panel {
      width:var(--panel-w);
      flex-shrink:0;
      background:#fafafa;
      border-left:1px solid var(--border);
      overflow-y:auto;
      display:flex;
      flex-direction:column;
    }
    .right-panel::-webkit-scrollbar { width:4px; }
    .right-panel::-webkit-scrollbar-thumb { background:#e5e7eb; border-radius:4px; }

    .rp-header {
      padding:18px 20px 14px;
      border-bottom:1px solid var(--border);
      background:#fff; flex-shrink:0;
    }
    .rp-header h2 { font-size:15px; font-weight:700; color:#1a1a1a; margin-bottom:3px; }
    .rp-header p { font-size:12px; color:#9ca3af; }

    .rp-empty {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:32px 24px; text-align:center; color:#b0b5be;
    }
    .rp-empty svg { width:48px; height:48px; margin-bottom:12px; opacity:.4; }
    .rp-empty p { font-size:13px; line-height:1.6; }

    .rp-sections { padding:0 0 24px; }

    .rp-section {
      padding:16px 20px;
      border-bottom:1px solid var(--border);
      animation:fadeUp .3s ease;
    }
    .rp-section:last-child { border-bottom:none; }
    .rp-section h3 {
      font-size:13px; font-weight:700; color:#1a1a1a;
      margin-bottom:10px;
    }
    .rp-bullets { list-style:none; display:flex; flex-direction:column; gap:7px; }
    .rp-bullets li {
      font-size:12.5px; color:#374151; line-height:1.6;
      padding-left:14px; position:relative;
    }
    .rp-bullets li::before {
      content:'·'; position:absolute; left:2px; color:#9ca3af; font-size:16px; line-height:1;
    }

    .rp-card {
      border:1px solid var(--border);
      border-radius:8px;
      padding:11px 14px;
      background:#fff;
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:7px; cursor:pointer; transition:all .15s;
    }
    .rp-card:last-child { margin-bottom:0; }
    .rp-card:hover { border-color:#9ca3af; }
    .rp-card .rpc-left { flex:1; min-width:0; }
    .rp-card .rpc-title { font-size:12.5px; font-weight:600; color:#1a1a1a; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rp-card .rpc-sub { font-size:11px; color:#9ca3af; }
    .rp-card .rpc-icon { width:20px; height:20px; color:#d1d5db; flex-shrink:0; margin-left:8px; }

    .badge {
      display:inline-block;
      font-size:10px; font-weight:600;
      padding:2px 7px; border-radius:10px;
      margin-bottom:6px;
    }
    .badge.success { background:#d1fae5; color:#065f46; }
    .badge.warn { background:#fef3c7; color:#92400e; }

    /* 타이핑 인디케이터 */
    .typing-indicator {
      display:flex; gap:4px; padding:4px 0; align-items:center;
    }
    .typing-dot {
      width:7px; height:7px; background:#d1d5db;
      border-radius:50%; animation:typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay:.2s; }
    .typing-dot:nth-child(3) { animation-delay:.4s; }
    @keyframes typingBounce {
      0%,60%,100% { transform:translateY(0); }
      30% { transform:translateY(-5px); }
    }

    /* 스크롤 숨기기 */
    .chat-messages, .right-panel { scrollbar-gutter:stable; }

    /* 도움말 툴팁 */
    .help-modal {
      position:fixed; inset:0; background:rgba(0,0,0,.3);
      display:flex; align-items:center; justify-content:center;
      z-index:1000; opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .help-modal.visible { opacity:1; pointer-events:all; }
    .help-box {
      background:#fff; border-radius:14px; padding:28px 32px;
      max-width:400px; width:90%;
      box-shadow:0 8px 32px rgba(0,0,0,.12);
    }
    .help-box h3 { font-size:16px; font-weight:700; margin-bottom:12px; }
    .help-box p { font-size:13.5px; line-height:1.7; color:#374151; margin-bottom:16px; }
    .help-box .close-btn {
      padding:8px 20px; background:#1a2a3a; color:#fff;
      border:none; border-radius:8px; cursor:pointer;
      font-size:13px; font-family:'Noto Sans KR',sans-serif;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── 사이드바 ─────────────────────────────────── -->
  <nav class="sidebar">
    <div class="sb-top">
      <!-- 햄버거 -->
      <div class="sb-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </div>
      <!-- 프로필 -->
      <div class="sb-icon active" title="프로필">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>

      <div class="sb-label">서비스</div>
      <!-- 채팅 -->
      <div class="sb-icon" title="상담">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <!-- 문서 -->
      <div class="sb-icon" title="서류">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <!-- 리스트 -->
      <div class="sb-icon" title="목록">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </div>

      <div class="sb-divider"></div>
      <div class="sb-label">APT</div>

      <div class="sb-icon" title="단지 정보">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      </div>
      <div class="sb-icon" title="공지사항">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>

      <div class="sb-divider"></div>
      <div class="sb-label">관리</div>

      <div class="sb-icon" title="설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
    </div>

    <div class="sb-bot">
      <!-- 로그아웃 -->
      <div class="sb-icon" title="로그아웃">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
    </div>
  </nav>

  <!-- ── 채팅 영역 ─────────────────────────────────── -->
  <div class="chat-wrap">
    <div class="chat-header">
      <div class="back-btn" onclick="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        이전
      </div>
      <div class="help-btn" onclick="showHelp()">?</div>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input-wrap">
      <input type="text" class="chat-input" id="chatInput"
        placeholder="다양한 단지 사례를 검색해보세요. 키피라이팅 대충" 
        onkeydown="if(event.key==='Enter') sendFreeText()">
      <button class="send-btn" onclick="sendFreeText()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- ── 오른쪽 패널 ────────────────────────────────── -->
  <aside class="right-panel" id="rightPanel">
    <div class="rp-header">
      <h2 id="rpTitle">AI 상담 요약</h2>
      <p id="rpSub">상담을 시작하면 요약 내용이 표시됩니다</p>
    </div>
    <div id="rpBody">
      <div class="rp-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
        </svg>
        <p>채팅에서 상담을 시작하면<br>분석 결과와 관련 자료가<br>여기에 표시됩니다.</p>
      </div>
    </div>
  </aside>
</div>

<!-- 도움말 모달 -->
<div class="help-modal" id="helpModal" onclick="closeHelp(event)">
  <div class="help-box">
    <h3>아파트집사 AI 상담 안내</h3>
    <p>
      아파트집사는 <strong>공동주택 입주민</strong>을 위한 AI 법률 상담 서비스입니다.<br><br>
      입주자대표회의 운영, 관리비 분쟁, 임원 해임, 층간소음 대응 등<br>
      공동주택 생활에서 발생하는 법률 문제를 도와드립니다.<br><br>
      <strong>주의:</strong> 본 서비스는 일반적인 정보 제공 목적이며,
      실제 법률 자문은 공인된 변호사나 전문가에게 의뢰하시기 바랍니다.
    </p>
    <button class="close-btn" onclick="closeHelp()">확인</button>
  </div>
</div>

<script>
/* ============================================================
   상태 관리
============================================================ */
let step = 0;
let selectedReason = null;
let selectedUnits = null;
let activeTab = 'cases';
let detailOpen = false;

const msgs = document.getElementById('messages');
const rpBody = document.getElementById('rpBody');

/* ============================================================
   초기화 — 페이지 로드 시 첫 AI 메시지
============================================================ */
window.addEventListener('load', () => {
  setTimeout(() => {
    addAiMsg(
      `안녕하세요! 입주자대표회의 법률 상담 도우미입니다.<br>
       무엇을 도와드릴까요?`,
      [
        { label: '회장·임원 해임', action: () => selectTopic('해임') },
        { label: '관리비 분쟁', action: () => selectTopic('관리비') },
        { label: '층간소음 대응', action: () => selectTopic('소음') },
        { label: '관리업체 교체', action: () => selectTopic('업체교체') },
        { label: '직접 입력', action: () => focusInput() },
      ]
    );
    step = 1;
  }, 300);
});

/* ============================================================
   주제 선택 (Step 1)
============================================================ */
function selectTopic(topic) {
  if (step !== 1) return;
  step = 2;
  disableAllButtons();

  if (topic === '해임') {
    addUserMsg('입주자대표회의의 회장을 해임하고 싶은데, 어떻게 해야 하나요?');
    showTyping(() => {
      addAiMsg(

function appendTabs() {
  const container = document.createElement('div');
  container.className = 'msg ai';
  container.style.marginTop = '4px';

  const tabBar = document.createElement('div');
  tabBar.className = 'result-tabs';
  tabBar.id = 'resultTabs';

  const tabs = [
    { id:'cases', label:'유사 사례' },
    { id:'docs',  label:'문서 서식' },
    { id:'laws',  label:'관련 법령' },
  ];
  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'rtab' + (t.id === activeTab ? ' active' : '');
    el.textContent = t.label;
    el.onclick = () => switchTab(t.id);
    el.dataset.tabId = t.id;
    tabBar.appendChild(el);
  });

  const content = document.createElement('div');
  content.className = 'tab-content';
  content.id = 'tabContent';

  container.appendChild(tabBar);
  container.appendChild(content);
  msgs.appendChild(container);

  renderTabContent('cases');
  scrollBottom();
}

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.rtab').forEach(el => {
    el.classList.toggle('active', el.dataset.tabId === id);

  renderTabContent(id);
}

function toggleDetail(card, idx, container) {
  const existing = container.querySelector('.detail-card');
  if (existing && existing.dataset.idx === String(idx)) {
    existing.remove();
    detailOpen = false;
    return;
  }
  if (existing) existing.remove();
  const data = detailData[idx];
  const div = document.createElement('div');
  div.className = 'detail-card';
  div.dataset.idx = String(idx);
  div.innerHTML = `<div class="dc-title">${data.title}</div>` +
    data.sections.map(s => `
      <div class="dc-section">
        <h4>■ ${s.heading}</h4>
        <ul>${s.items.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
    `).join('');
  card.parentNode.insertBefore(div, card.nextSibling);
  detailOpen = true;
  scrollBottom();
}

function loadCaseDetail(e) {
  e.stopPropagation();
  const content = document.getElementById('tabContent');
  if (!content) return;
  const existing = content.querySelector('.detail-card[data-idx="0"]');
  if (!existing) {
    const cards = content.querySelectorAll('.case-card');
    if (cards[0]) toggleDetail(cards[0], 0, content);
  }
  scrollBottom();
}

function switchTabAndFocus(tabId, caseIdx) {
  // 탭 전환 후 해당 케이스 상세 열기
  switchTab(tabId);
  setTimeout(() => {
    const content = document.getElementById('tabContent');
    if (!content) return;
    const cards = content.querySelectorAll('.case-card');
    if (cards[caseIdx]) {
      toggleDetail(cards[caseIdx], caseIdx, content);
      cards[caseIdx].scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
  }, 100);
}

/* ============================================================
   자유 텍스트 입력
============================================================ */
function sendFreeText() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addUserMsg(text);
  showTyping(() => {
    addAiMsg(
      `감사합니다. "<strong>${text}</strong>"에 대해 답변드리겠습니다.<br><br>
       이 기능은 현재 데모 버전으로, 미리 설정된 시나리오(회장 해임)만 완전히 지원됩니다.<br>
       실제 서비스에서는 다양한 입주자대표회의 분쟁 유형에 대해 답변드릴 수 있습니다.`
    );
  });
}

function focusInput() {
  document.getElementById('chatInput').focus();
}

/* ============================================================
   유틸 함수
============================================================ */
function addUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text;
  div.appendChild(bubble);
  msgs.appendChild(div);
  scrollBottom();
}

function addAiMsg(html, buttons) {
  const div = document.createElement('div');
  div.className = 'msg ai';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const p = document.createElement('p');
  p.innerHTML = html;
  bubble.appendChild(p);
  div.appendChild(bubble);

  if (buttons && buttons.length) {
    const btnWrap = document.createElement('div');
    btnWrap.className = 'quick-btns';
    btnWrap.dataset.btnGroup = Date.now();
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'qbtn';
      btn.textContent = b.label;
      btn.onclick = () => {
        btn.classList.add('selected');
        b.action();
      };
      btnWrap.appendChild(btn);
    });
    div.appendChild(btnWrap);
  }

  msgs.appendChild(div);
  scrollBottom();
}

function showTyping(callback) {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  msgs.appendChild(div);
  scrollBottom();
  setTimeout(() => {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
    callback();
  }, 900 + Math.random() * 400);
}

function disableAllButtons() {
  document.querySelectorAll('.qbtn').forEach(b => b.disabled = true);
}

function scrollBottom() {
  setTimeout(() => { msgs.scrollTop = msgs.scrollHeight; }, 50);
}

function goBack() {
  if (confirm('상담을 종료하고 이전 화면으로 돌아가시겠어요?')) {
    window.location.reload();
  }
}

function showHelp() {
  document.getElementById('helpModal').classList.add('visible');
}
function closeHelp(e) {
  if (!e || e.target === document.getElementById('helpModal')) {
    document.getElementById('helpModal').classList.remove('visible');
  }
}
</script>
